<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; color: #eee; }
  .container { text-align: center; }
  h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .status { font-size: 1.3rem; margin-bottom: 1rem; min-height: 2rem; }
  .board { display: grid; grid-template-columns: repeat(3, 120px); gap: 8px; margin: 0 auto 1.5rem; }
  .cell {
    width: 120px; height: 120px; background: #16213e; border: 2px solid #0f3460;
    border-radius: 12px; font-size: 3rem; font-weight: bold; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
  }
  .cell:hover:not(.taken) { background: #1a2a50; transform: scale(1.05); }
  .cell.x { color: #e94560; }
  .cell.o { color: #0f3460; text-shadow: 0 0 8px #5089c6; color: #5089c6; }
  .cell.win { background: #0f3460; animation: pulse 0.6s ease-in-out infinite alternate; }
  @keyframes pulse { to { background: #1a3a6e; } }
  button { padding: 0.7rem 2rem; font-size: 1.1rem; border: none; border-radius: 8px; cursor: pointer; background: #e94560; color: #fff; transition: background 0.2s; }
  button:hover { background: #c73650; }
  .score { display: flex; gap: 2rem; justify-content: center; margin-bottom: 1rem; font-size: 1.1rem; }
  .score span { padding: 0.3rem 1rem; border-radius: 6px; background: #16213e; }
</style>
</head>
<body>
<div class="container">
  <h1>Tic Tac Toe</h1>
  <div class="score">
    <span>X: <strong id="sx">0</strong></span>
    <span>O: <strong id="so">0</strong></span>
    <span>Draw: <strong id="sd">0</strong></span>
  </div>
  <div class="status" id="status">X's turn</div>
  <div class="board" id="board"></div>
  <button onclick="reset()">New Game</button>
</div>
<script>
  const board = document.getElementById('board');
  const statusEl = document.getElementById('status');
  let cells, current, state, over;
  let scores = { x: 0, o: 0, d: 0 };
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  function reset() {
    state = Array(9).fill('');
    current = 'X';
    over = false;
    statusEl.textContent = "X's turn";
    board.innerHTML = '';
    cells = [];
    for (let i = 0; i < 9; i++) {
      const c = document.createElement('div');
      c.className = 'cell';
      c.addEventListener('click', () => play(i));
      board.appendChild(c);
      cells.push(c);
    }
  }

  function play(i) {
    if (over || state[i]) return;
    state[i] = current;
    cells[i].textContent = current;
    cells[i].classList.add(current.toLowerCase(), 'taken');
    const w = checkWin();
    if (w) {
      over = true;
      w.forEach(j => cells[j].classList.add('win'));
      statusEl.textContent = current + ' wins!';
      scores[current.toLowerCase()]++;
    } else if (state.every(c => c)) {
      over = true;
      statusEl.textContent = "It's a draw!";
      scores.d++;
    } else {
      current = current === 'X' ? 'O' : 'X';
      statusEl.textContent = current + "'s turn";
    }
    updateScores();
  }

  function checkWin() {
    for (const [a, b, c] of wins) {
      if (state[a] && state[a] === state[b] && state[a] === state[c]) return [a, b, c];
    }
    return null;
  }

  function updateScores() {
    document.getElementById('sx').textContent = scores.x;
    document.getElementById('so').textContent = scores.o;
    document.getElementById('sd').textContent = scores.d;
  }

  reset();
</script>
</body>
</html>
